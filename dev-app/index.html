<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronSight Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #e5e7eb;
      --muted: #6b7280;
      --dim: #374151;
      --cyan: #06b6d4;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --purple: #a855f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      -webkit-app-region: drag;
      overflow: hidden;
      height: 100vh;
    }

    button, input, textarea, select { -webkit-app-region: no-drag; }

    .titlebar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 80px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .titlebar h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }

    .content {
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 16px;
      -webkit-app-region: no-drag;
    }

    .status-bar {
      display: flex;
      gap: 16px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-bar span { display: flex; align-items: center; gap: 4px; }
    .status-bar .val { color: var(--text); font-weight: 600; }

    /* Claude prompt */
    .claude-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .claude-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      outline: none;
    }

    .claude-bar input:focus { border-color: var(--cyan); }

    .claude-bar button {
      background: var(--cyan);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .claude-bar button:hover { filter: brightness(1.1); }

    /* Workflow list */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      margin: 16px 0 8px;
    }

    .workflow-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .workflow-card:hover { border-color: #333; }
    .workflow-card.selected { border-color: rgba(6,182,212,0.4); background: rgba(6,182,212,0.03); }

    .workflow-card .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .workflow-card .info { flex: 1; min-width: 0; }
    .workflow-card .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .workflow-card .meta { font-size: 10px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }

    .engine-badge {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .engine-vercel { background: rgba(156,163,175,0.15); color: #9ca3af; }
    .engine-github { background: rgba(168,85,247,0.15); color: var(--purple); }
    .engine-pi { background: rgba(34,197,94,0.15); color: var(--green); }

    .run-btn {
      background: none;
      border: 1px solid rgba(6,182,212,0.3);
      color: var(--cyan);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .run-btn:hover { border-color: var(--cyan); background: rgba(6,182,212,0.1); }
    .run-btn:disabled { opacity: 0.4; cursor: default; }

    /* Output panel */
    .output-panel {
      background: #050505;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 12px;
      overflow: hidden;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--dim);
    }

    .output-body {
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--green);
    }

    .output-body.error { color: var(--red); }

    .exit-badge {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .exit-0 { background: rgba(34,197,94,0.15); color: var(--green); }
    .exit-fail { background: rgba(239,68,68,0.15); color: var(--red); }

    .duration { color: var(--muted); font-size: 9px; }

    /* Pulse animation */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulsing { animation: pulse 1.5s infinite; }

    /* Run history */
    .run-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 11px;
      border-bottom: 1px solid rgba(31,31,31,0.5);
      cursor: pointer;
    }

    .run-row:hover { background: rgba(255,255,255,0.02); }
    .run-row .run-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .run-row .run-status { width: 60px; font-size: 10px; text-transform: capitalize; }
    .run-row .run-trigger { font-size: 9px; padding: 1px 5px; background: rgba(31,31,31,0.8); border-radius: 3px; color: var(--muted); }
    .run-row .run-time { margin-left: auto; font-size: 9px; color: var(--dim); }
    .run-row .run-dur { font-size: 9px; color: var(--muted); }

    .empty { text-align: center; padding: 32px; color: var(--dim); font-size: 12px; }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>IronSight Dev</h1>
    <span class="badge badge-green" id="engine-badge">LOCAL</span>
    <span class="badge badge-blue" id="status-badge" style="display:none">0 RUNNING</span>
  </div>

  <div class="content">
    <div class="status-bar" id="status-bar">
      <span>Repo: <span class="val" id="repo-path">...</span></span>
      <span>Cron: <span class="val" id="cron-count">0</span></span>
      <span>Pi 5: <span class="val" id="pi-host">...</span></span>
    </div>

    <div class="claude-bar">
      <input type="text" id="claude-input" placeholder="Run Claude: type a prompt and press Enter..." />
      <button onclick="runClaude()">Run</button>
    </div>

    <div class="section-title">Workflows</div>
    <div id="workflow-list"></div>

    <div id="output-section" style="display:none">
      <div class="output-panel">
        <div class="output-header">
          <span id="output-title">Output</span>
          <span id="output-meta"></span>
        </div>
        <div class="output-body" id="output-body"></div>
      </div>
    </div>

    <div id="runs-section" style="display:none">
      <div class="section-title">Run History</div>
      <div id="runs-list"></div>
    </div>
  </div>

  <script>
    let workflows = [];
    let selectedId = null;
    let streamingOutput = "";

    // ── Init ──────────────────────────────────────────────
    async function init() {
      const status = await window.ironsight.getStatus();
      document.getElementById("repo-path").textContent = status.repoRoot.split("/").pop();
      document.getElementById("cron-count").textContent = status.cronJobs;
      document.getElementById("pi-host").textContent = status.pi5Host;

      await refreshWorkflows();

      // Listen for events
      window.ironsight.onRunOutput(({ stdout, runId }) => {
        streamingOutput += stdout;
        const body = document.getElementById("output-body");
        body.textContent = streamingOutput;
        body.scrollTop = body.scrollHeight;
      });

      window.ironsight.onRunStarted(({ runId, workflow }) => {
        streamingOutput = "";
        showOutput(`Running: ${workflow.name}`, "", true);
        updateStatusBadge(1);
      });

      window.ironsight.onRunCompleted(({ runId, status, result }) => {
        showOutput(
          `${status === "completed" ? "Done" : "Failed"}: ${selectedId ? workflows.find(w => w.id === selectedId)?.name : ""}`,
          result.stdout || result.stderr,
          false,
          result
        );
        updateStatusBadge(0);
        refreshWorkflows();
      });

      window.ironsight.onQuickResult(({ action, result }) => {
        showOutput(action, result.stdout || result.stderr, false, result);
      });

      window.ironsight.onOpenClaudePrompt(() => {
        document.getElementById("claude-input").focus();
      });
    }

    async function refreshWorkflows() {
      workflows = await window.ironsight.getWorkflows();
      renderWorkflows();
    }

    function renderWorkflows() {
      const list = document.getElementById("workflow-list");
      if (workflows.length === 0) {
        list.innerHTML = '<div class="empty">No workflows yet. Create one in the dashboard.</div>';
        return;
      }

      list.innerHTML = workflows.map(w => {
        const engineClass = w.engine === "dev-pi" ? "engine-pi" : w.engine === "github-actions" ? "engine-github" : "engine-vercel";
        const engineLabel = w.engine === "dev-pi" ? "Pi 5" : w.engine === "github-actions" ? "GitHub" : "Vercel";
        const engineIcon = w.engine === "dev-pi" ? "🖥" : w.engine === "github-actions" ? "⚙" : "⏱";
        return `
          <div class="workflow-card ${selectedId === w.id ? "selected" : ""}" onclick="selectWorkflow('${w.id}')">
            <div class="dot" style="background: ${w.isActive ? "var(--green)" : "var(--dim)"}"></div>
            <div class="info">
              <div class="name">${w.name}</div>
              <div class="meta">
                <span class="engine-badge ${engineClass}">${engineIcon} ${engineLabel}</span>
                ${w.cronExpression ? `<span>${w.cronExpression}</span>` : "<span>manual</span>"}
              </div>
            </div>
            <button class="run-btn" onclick="event.stopPropagation(); triggerRun('${w.id}')">Run</button>
          </div>
        `;
      }).join("");
    }

    async function selectWorkflow(id) {
      selectedId = id;
      renderWorkflows();

      const runs = await window.ironsight.getRuns(id);
      const section = document.getElementById("runs-section");
      const list = document.getElementById("runs-list");
      section.style.display = "block";

      if (runs.length === 0) {
        list.innerHTML = '<div class="empty">No runs yet</div>';
        return;
      }

      list.innerHTML = runs.slice(0, 15).map(r => {
        const color = r.status === "completed" ? "var(--green)" :
                      r.status === "failed" ? "var(--red)" :
                      r.status === "running" ? "var(--blue)" : "var(--dim)";
        const dur = r.ended_at ? `${((new Date(r.ended_at) - new Date(r.started_at)) / 1000).toFixed(1)}s` : "...";
        const ago = timeAgo(r.started_at);
        return `
          <div class="run-row" onclick="showRunOutput('${r.id}', ${JSON.stringify(r.output).replace(/'/g, "\\'")})">
            <div class="run-dot" style="background:${color}"></div>
            <span class="run-status" style="color:${color}">${r.status}</span>
            <span class="run-trigger">${r.trigger}</span>
            <span class="run-dur">${dur}</span>
            <span class="run-time">${ago}</span>
          </div>
        `;
      }).join("");
    }

    function showRunOutput(runId, output) {
      if (!output) return;
      showOutput("Run Output", output.stdout || JSON.stringify(output, null, 2), false, output);
    }

    async function triggerRun(id) {
      streamingOutput = "";
      selectedId = id;
      renderWorkflows();
      const w = workflows.find(w => w.id === id);
      showOutput(`Starting: ${w?.name || id}`, "Initializing...", true);
      await window.ironsight.triggerWorkflow(id);
    }

    async function runClaude() {
      const input = document.getElementById("claude-input");
      const prompt = input.value.trim();
      if (!prompt) return;
      input.value = "";
      streamingOutput = "";
      showOutput(`Claude: ${prompt.slice(0, 60)}...`, "Starting Claude session...", true);
      await window.ironsight.runClaude(prompt);
    }

    document.getElementById("claude-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") runClaude();
    });

    function showOutput(title, body, streaming = false, result = null) {
      const section = document.getElementById("output-section");
      const titleEl = document.getElementById("output-title");
      const metaEl = document.getElementById("output-meta");
      const bodyEl = document.getElementById("output-body");

      section.style.display = "block";
      titleEl.textContent = title;

      if (streaming) {
        metaEl.innerHTML = '<span class="pulsing" style="color:var(--blue)">● running</span>';
        bodyEl.className = "output-body";
        bodyEl.textContent = body;
      } else if (result) {
        const exit = result.exitCode ?? "?";
        const dur = result.durationMs ? (result.durationMs < 1000 ? `${result.durationMs}ms` : `${(result.durationMs / 1000).toFixed(1)}s`) : "";
        metaEl.innerHTML = `
          <span class="exit-badge ${exit === 0 ? "exit-0" : "exit-fail"}">exit ${exit}</span>
          ${dur ? `<span class="duration">${dur}</span>` : ""}
        `;
        bodyEl.className = `output-body ${exit !== 0 ? "error" : ""}`;
        bodyEl.textContent = result.stdout || result.stderr || body;
      } else {
        metaEl.textContent = "";
        bodyEl.className = "output-body";
        bodyEl.textContent = body;
      }

      bodyEl.scrollTop = bodyEl.scrollHeight;
    }

    function updateStatusBadge(running) {
      const badge = document.getElementById("status-badge");
      if (running > 0) {
        badge.style.display = "inline";
        badge.textContent = `${running} RUNNING`;
      } else {
        badge.style.display = "none";
      }
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    init();
  </script>
</body>
</html>
