<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IronSight Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #161616; --surface3: #1a1a1a;
      --border: #1f1f1f; --border2: #2a2a2a;
      --text: #e5e7eb; --muted: #6b7280; --dim: #374151;
      --cyan: #06b6d4; --green: #22c55e; --red: #ef4444;
      --blue: #3b82f6; --amber: #f59e0b; --purple: #8b5cf6; --pink: #ec4899; --teal: #14b8a6;
      --sidebar-w: 180px;
    }
    @media (prefers-color-scheme: light) { :root.theme-system { --bg: #f5f5f5; --surface: #fff; --surface2: #f0f1f3; --surface3: #e8e9eb; --border: #e2e4e8; --border2: #d1d3d7; --text: #1a1a1a; --muted: #6b7280; --dim: #9ca3af; } }
    :root.theme-light { --bg: #f5f5f5; --surface: #fff; --surface2: #f0f1f3; --surface3: #e8e9eb; --border: #e2e4e8; --border2: #d1d3d7; --text: #1a1a1a; --muted: #6b7280; --dim: #9ca3af; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--bg); color: var(--text); font-size: 13px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    button, input, textarea, select { -webkit-app-region: no-drag; font-family: inherit; }
    a { color: var(--cyan); text-decoration: none; }
    .titlebar { height: 52px; display: flex; align-items: center; padding: 0 16px 0 80px; border-bottom: 1px solid var(--border); -webkit-app-region: drag; gap: 10px; flex-shrink: 0; }
    .titlebar h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
    .app { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 8px; gap: 1px; flex-shrink: 0; }
    .nav-section { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); padding: 12px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 12px; font-weight: 500; width: 100%; text-align: left; transition: all 0.12s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(6,182,212,0.08); color: var(--cyan); font-weight: 600; }
    .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .nav-count { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: auto; }
    .content { flex: 1; overflow-y: auto; padding: 20px 24px; -webkit-app-region: no-drag; }
    .briefing { margin-bottom: 20px; }
    .briefing-greeting { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .briefing-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .status-strip { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .status-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .status-pill:hover { border-color: var(--border2); }
    .status-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-pill.ok .pill-dot { background: var(--green); }
    .status-pill.warn .pill-dot { background: var(--amber); }
    .status-pill.fail .pill-dot { background: var(--red); }
    .status-pill.stale .pill-dot { background: var(--dim); }
    .status-pill.running .pill-dot { background: var(--blue); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .issues-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .issues-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .issues-title { font-size: 12px; font-weight: 700; }
    .issue-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .issue-row:last-child { border-bottom: none; }
    .issue-severity { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .issue-severity.critical { background: var(--red); }
    .issue-severity.warning { background: var(--amber); }
    .issue-body { flex: 1; min-width: 0; }
    .issue-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .issue-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .issue-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .issue-action { font-size: 10px; font-weight: 600; color: var(--cyan); cursor: pointer; padding: 2px 8px; border: 1px solid rgba(6,182,212,0.3); border-radius: 4px; background: rgba(6,182,212,0.06); }
    .issue-action:hover { background: rgba(6,182,212,0.15); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); }
    .btn-sm { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 10px; font-size: 10px; font-weight: 600; cursor: pointer; }
    .btn-sm:hover { color: var(--text); border-color: var(--border2); }
    .btn-primary { background: var(--cyan); color: #fff; border: none; border-radius: 6px; padding: 4px 12px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; }
    .finding-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .finding-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .finding-sev { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; }
    .finding-sev.critical { background: rgba(239,68,68,0.15); color: var(--red); }
    .finding-sev.high { background: rgba(245,158,11,0.15); color: var(--amber); }
    .finding-sev.medium { background: rgba(59,130,246,0.15); color: var(--blue); }
    .finding-sev.low { background: rgba(107,114,128,0.15); color: var(--muted); }
    .finding-title { font-size: 12px; font-weight: 600; }
    .finding-detail { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 2px; }
    .finding-file { font-size: 9px; font-family: "SF Mono", monospace; padding: 1px 5px; background: var(--surface2); border-radius: 3px; color: var(--cyan); margin-top: 4px; display: inline-block; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 4px; }
    .task-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    .task-check.done { background: var(--green); border-color: var(--green); color: #fff; }
    .task-check.in_progress { background: var(--blue); border-color: var(--blue); color: #fff; }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-title.done { text-decoration: line-through; color: var(--dim); }
    .task-meta { font-size: 10px; color: var(--muted); display: flex; gap: 8px; }
    .task-prio { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
    .task-prio.critical { background: rgba(239,68,68,0.15); color: var(--red); }
    .task-prio.high { background: rgba(245,158,11,0.15); color: var(--amber); }
    .task-prio.medium { background: rgba(59,130,246,0.15); color: var(--blue); }
    .task-prio.low { background: rgba(107,114,128,0.15); color: var(--muted); }
    .task-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 6px; font-size: 9px; cursor: pointer; }
    .task-btn:hover { color: var(--text); border-color: var(--border2); }
    .activity-list { max-height: 300px; overflow-y: auto; }
    .activity-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; border-bottom: 1px solid rgba(31,31,31,0.3); }
    .activity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .activity-text { flex: 1; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-time { font-size: 9px; color: var(--dim); white-space: nowrap; }
    .prompt-row { display: flex; gap: 8px; }
    .prompt-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 12px; font-family: "SF Mono", monospace; outline: none; }
    .prompt-row input:focus { border-color: var(--cyan); }
    .prompt-row select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 8px; font-size: 11px; outline: none; }
    .prompt-row button { background: var(--cyan); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .feed-list { max-height: 200px; overflow-y: auto; }
    .feed-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 11px; border-bottom: 1px solid rgba(31,31,31,0.4); }
    .feed-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .feed-dot.ok { background: var(--green); } .feed-dot.fail { background: var(--red); } .feed-dot.warn { background: var(--amber); }
    .feed-type { width: 50px; font-size: 9px; color: var(--dim); text-transform: uppercase; font-weight: 600; flex-shrink: 0; }
    .feed-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-time { font-size: 9px; color: var(--dim); white-space: nowrap; }
    .output-panel { background: #050505; border: 1px solid var(--border); border-radius: 10px; margin-top: 12px; overflow: hidden; }
    .output-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); }
    .output-body { padding: 12px 14px; max-height: 350px; overflow-y: auto; font-family: "SF Mono", monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: var(--green); }
    .streaming-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); animation: pulse 1s infinite; margin-left: 4px; vertical-align: middle; }
    .chat-messages { max-height: 500px; overflow-y: auto; margin-bottom: 12px; }
    .chat-msg { padding: 8px 12px; margin-bottom: 6px; border-radius: 10px; font-size: 12px; line-height: 1.6; }
    .chat-msg.user { background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.15); }
    .chat-msg.assistant { background: var(--surface); border: 1px solid var(--border); }
    .chat-sender { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
    .chat-msg.user .chat-sender { color: var(--cyan); }
    .chat-msg.assistant .chat-sender { color: var(--green); }
    .chat-time { font-size: 9px; color: var(--dim); float: right; }
    .chat-text { word-break: break-word; }
    .audit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .audit-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; text-align: center; transition: all 0.12s; }
    .audit-btn:hover { border-color: var(--cyan); }
    .audit-btn.active { border-color: var(--cyan); background: rgba(6,182,212,0.06); }
    .audit-btn-icon { font-size: 20px; margin-bottom: 4px; }
    .audit-btn-label { font-size: 11px; font-weight: 600; }
    .autofix-banner { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .autofix-banner .streaming-dot { background: var(--blue); }
    .collapse-header { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 0; user-select: none; }
    .chevron { font-size: 10px; color: var(--dim); transition: transform 0.15s; }
    .chevron.open { transform: rotate(90deg); }
    .wf-card { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 4px; }
    .wf-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .wf-info { flex: 1; min-width: 0; }
    .wf-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wf-meta { font-size: 10px; color: var(--muted); }
    .run-btn { background: none; border: 1px solid rgba(6,182,212,0.3); color: var(--cyan); border-radius: 4px; padding: 3px 8px; font-size: 10px; font-weight: 600; cursor: pointer; }
    .prompt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .prompt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.12s; }
    .prompt-card:hover { border-color: var(--cyan); }
    .prompt-card-cat { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cyan); margin-bottom: 3px; }
    .prompt-card-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .prompt-card-desc { font-size: 10px; color: var(--muted); }
    .settings-section { margin-bottom: 24px; }
    .settings-section h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 4px; }
    .setting-label { font-size: 12px; }
    .setting-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--dim); border-radius: 10px; transition: background 0.2s; }
    .toggle input:checked + .toggle-track { background: var(--cyan); }
    .toggle-track::after { content: ""; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform 0.2s; }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
    select.setting-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 11px; outline: none; }
    .cred-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 11px; outline: none; width: 280px; font-family: "SF Mono", monospace; }
    .memory-entry { display: flex; align-items: center; gap: 8px; padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 3px; font-size: 11px; }
    .memory-tag { font-size: 9px; font-weight: 700; min-width: 70px; }
    .memory-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 10px; }
    .tab-bar { display: flex; gap: 2px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
    .tab { padding: 6px 14px; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .md { font-size: 12px; line-height: 1.7; }
    .md h1,.md h2,.md h3 { font-weight: 700; margin: 10px 0 6px; }
    .md code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-family: "SF Mono", monospace; font-size: 11px; }
    .md pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin: 6px 0; overflow-x: auto; }
    .md pre code { background: none; padding: 0; }
    .md strong { font-weight: 700; color: var(--text); }
    .status-bar { height: 26px; display: flex; align-items: center; gap: 16px; padding: 0 16px; background: var(--surface); border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); flex-shrink: 0; }
    .status-bar .val { color: var(--text); font-weight: 600; }
    .sb-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; }
    .empty { text-align: center; padding: 20px; color: var(--dim); font-size: 12px; }
  </style>
</head>
<body>
  <div class="titlebar"><h1>IronSight Dev</h1><span class="badge badge-green" id="health-badge">...</span><span class="badge badge-blue" id="agent-badge" style="display:none">AGENT</span></div>
  <div class="app"><div class="sidebar" id="sidebar"></div><div class="content" id="content"></div></div>
  <div class="status-bar"><span id="sb-health">...</span><span id="sb-pi">Pi 5: <span class="val">...</span></span><span id="sb-git">...</span><span id="sb-autofix" style="display:none"></span></div>
  <script>
    const state = { currentView:"watch", health:{}, feed:[], templates:[], workflows:[], output:null, streamingOutput:"", workflowsExpanded:false, outputVisible:false, runningChecks:new Set(), chatHistory:[], chatStreaming:"", chatFocus:"general", agentRunning:false, auditResults:null, auditStreaming:"", auditScope:null, autofixStatus:null, autofixActive:null, autofixLog:"", diagnoses:{}, pendingFix:null, agentActivity:[], settings:{autoDiagnose:true,disabledChecks:[],theme:"system",scheduledRuns:true}, credentials:{}, memories:[] };
    const FOCUS_AREAS = [{id:"general",label:"General"},{id:"security",label:"Security"},{id:"database",label:"Database"},{id:"quality",label:"Quality"},{id:"infrastructure",label:"Infrastructure"},{id:"finance",label:"Finance"}];
    const AUDIT_SCOPES = [{id:"security",label:"Security",icon:"S"},{id:"tests",label:"Tests",icon:"T"},{id:"types",label:"Types",icon:"TS"},{id:"lint",label:"Lint",icon:"L"},{id:"deps",label:"Deps",icon:"D"},{id:"full",label:"Full",icon:"*"}];
    const PROMPT_LIBRARY = [
      {cat:"Fix",title:"Fix Failing Tests",desc:"Read failing tests, fix source, verify",prompt:"Fix the failing tests. Read each failing test file and the source code it tests. Fix the source. Run tests after."},
      {cat:"Fix",title:"Fix TypeScript Errors",desc:"Fix all TS errors",prompt:"Fix all TypeScript errors. Do not use any or @ts-ignore. Keep changes minimal."},
      {cat:"Review",title:"Review Changes",desc:"Security, bugs, performance review",prompt:"Review changed files for: 1) Bugs 2) Security issues 3) Performance concerns 4) Missing error handling. Only flag real issues."},
      {cat:"Write",title:"Write Tests",desc:"Vitest tests for changed files",prompt:"Write vitest unit tests for the changed files. Follow existing patterns. Run tests after."},
      {cat:"Deploy",title:"Deploy to Production",desc:"Typecheck > test > build > deploy",prompt:"Deploy to production. Stop if any step fails: 1. tsc --noEmit 2. vitest run 3. next build 4. vercel --prod --yes 5. curl production URL"},
      {cat:"Explain",title:"Explain Errors",desc:"Root cause analysis",prompt:"Explain what's going wrong. Root cause? Fix? Be concise."},
    ];
    function applyTheme(t){document.documentElement.classList.remove("theme-system","theme-light","theme-dark");document.documentElement.classList.add(t==="light"?"theme-light":t==="dark"?"theme-dark":"theme-system");}
    async function init(){
      state.settings=await window.ironsight.getSettings();state.credentials=await window.ironsight.getCredentials();applyTheme(state.settings.theme||"system");renderSidebar();
      const[h,f,t,af]=await Promise.all([window.ironsight.getSystemHealth(),window.ironsight.getChangeFeed(),window.ironsight.getPromptTemplates(),window.ironsight.autofixStatus()]);
      state.health=h;state.feed=f;state.templates=t;state.autofixStatus=af;state.diagnoses=af?.diagnoses||{};
      state.chatHistory=await window.ironsight.agentGetHistory();state.memories=await window.ironsight.agentGetMemory();
      renderView();updateStatusBar();updateHealthBadge();
      window.ironsight.onHealthUpdated(d=>{state.health[d.id]=d;state.runningChecks.delete(d.id);if(state.currentView==="watch")renderView();updateStatusBar();updateHealthBadge();});
      window.ironsight.onRunOutput(({stdout})=>{state.streamingOutput+=stdout;if(state.outputVisible)updateOutputBody();});
      window.ironsight.onRunStarted(({workflow})=>{state.streamingOutput="";showOutput("Running: "+workflow.name,"",true);});
      window.ironsight.onRunCompleted(({status,result})=>{showOutput(status==="completed"?"Done":"Failed",result.stdout||result.stderr,false,result);});
      window.ironsight.onNavigate(v=>navigate(v));
      window.ironsight.onRefreshAll(async()=>{state.health=await window.ironsight.getSystemHealth();renderView();});
      window.ironsight.onAgentStream(({type,chunk})=>{
        if(type==="chat"){state.chatStreaming+=chunk;if(state.currentView==="chat"){const el=document.getElementById("chat-stream");if(el){el.textContent=state.chatStreaming;el.scrollTop=el.scrollHeight;}}}
        else{state.auditStreaming+=chunk;const el=document.getElementById("audit-stream");if(el){el.textContent=state.auditStreaming;el.scrollTop=el.scrollHeight;}}
      });
      window.ironsight.onAgentActivity(entry=>{
        state.agentActivity.push(entry);if(state.agentActivity.length>200)state.agentActivity.splice(0,100);
        if(entry.action.includes("started")){state.agentRunning=true;updateAgentBadge(true);}
        if(entry.action.includes("complete")||entry.action.includes("error")){state.agentRunning=false;updateAgentBadge(false);}
        if(state.currentView==="activity")renderView();
      });
      window.ironsight.onAutofixDiagnosed(data=>{state.diagnoses[data.checkId]=data;if(state.currentView==="watch")renderView();});
      window.ironsight.onAutofixStarted(data=>{state.autofixActive=data.checkId;state.autofixLog="Fixing "+data.checkId+" (attempt "+data.attempt+")...\n";if(state.currentView==="watch")renderView();updateAutofixBar();});
      window.ironsight.onAutofixProgress(data=>{if(data.chunk)state.autofixLog+=data.chunk;else if(data.detail)state.autofixLog+=data.detail+"\n";const el=document.getElementById("autofix-log");if(el){el.textContent=state.autofixLog;el.scrollTop=el.scrollHeight;}});
      window.ironsight.onAutofixComplete(data=>{state.autofixActive=null;if(data.needsReview&&data.branch)state.pendingFix={branch:data.branch,diff:data.diff,success:data.success,detail:data.detail};state.autofixLog+="\n"+(data.detail||"Done")+"\n";if(state.currentView==="watch")renderView();updateAutofixBar();});
      setInterval(async()=>{state.feed=await window.ironsight.getChangeFeed();if(state.currentView==="watch")renderView();},60000);
    }
    function navigate(v){state.currentView=v;renderSidebar();renderView();}
    function renderSidebar(){const sb=document.getElementById("sidebar");let h='<div class="nav-section">Views</div>';h+=navItem("watch","Watch","var(--cyan)");h+=navItem("chat","Chat","var(--green)");h+=navItem("audit","Audit","var(--purple)");h+='<div style="flex:1"></div>';h+=navItem("settings","Settings","var(--dim)");sb.innerHTML=h;}
    function navItem(id,label,color){return'<button class="nav-item '+(state.currentView===id?"active":"")+'" onclick="navigate(\''+id+'\')"><span class="nav-dot" style="background:'+(state.currentView===id?color:"transparent")+'"></span>'+label+"</button>";}
    function renderView(){const v=state.currentView;if(v==="watch")renderWatchView();else if(v==="chat")renderChatView();else if(v==="audit")renderAuditView();else if(v==="settings")renderSettingsView();}

    function renderWatchView(){const c=document.getElementById("content");const checks=["git","tests","build","typecheck","lint","deps","vercel","supabase","ci","pi","migrations"];const fails=checks.filter(id=>state.health[id]?.status==="fail");const warns=checks.filter(id=>state.health[id]?.status==="warn");const oks=checks.filter(id=>state.health[id]?.status==="ok");let h="";
      const hour=new Date().getHours();const greeting=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";const gitD=state.health.git?.detail;const branch=gitD?.branch||"...";const dirty=gitD?.dirty||0;
      h+='<div class="briefing"><div class="briefing-greeting">'+greeting+', Andrew</div>';
      let summary=fails.length===0?"All "+oks.length+" systems healthy.":fails.length+" system"+(fails.length>1?"s":"")+" need"+(fails.length===1?"s":"")+" attention.";
      summary+=" On <strong>"+branch+"</strong>"+(dirty>0?" with "+dirty+" uncommitted file"+(dirty>1?"s":""):", clean")+".";
      h+='<div class="briefing-summary">'+summary+"</div></div>";
      h+='<div class="status-strip">';for(const id of checks){const x=state.health[id]||{status:"stale",label:id,summary:"..."};const running=state.runningChecks.has(id);h+='<div class="status-pill '+(running?"running":x.status)+'" onclick="runCheck(\''+id+'\')" title="'+esc(x.summary||"")+'"><span class="pill-dot"></span><span>'+(x.label||id)+"</span></div>";}h+="</div>";
      if(state.autofixActive){h+='<div class="autofix-banner"><span class="streaming-dot"></span><span>Fixing <strong>'+state.autofixActive+"</strong> on a branch...</span></div>";h+='<div class="output-panel"><div class="output-header">Fix Output</div><div class="output-body" id="autofix-log">'+esc(state.autofixLog)+"</div></div><div style='height:12px'></div>";}
      if(state.pendingFix){const pf=state.pendingFix;h+="<div style='background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:14px 16px;margin-bottom:16px'>";h+="<div style='font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px'>"+(pf.success?"Fix Ready for Review":"Fix Attempted")+"</div>";h+="<div style='font-size:11px;color:var(--muted);margin-bottom:8px'>Branch: <code style='color:var(--cyan)'>"+esc(pf.branch)+"</code></div>";if(pf.diff?.stat)h+="<pre style='background:var(--surface2);padding:8px;border-radius:6px;font-size:10px;margin-bottom:8px;max-height:150px;overflow:auto'>"+esc(pf.diff.stat)+"</pre>";h+="<div style='display:flex;gap:8px'><button class='btn-primary' onclick='mergePendingFix()'>Merge Fix</button><button class='btn-sm' onclick='showFullDiff()'>View Diff</button><button class='btn-sm' onclick='discardPendingFix()' style='color:var(--red)'>Discard</button></div></div>";}
      if(fails.length>0||warns.length>0){h+='<div class="issues-panel"><div class="issues-header"><span class="issues-title">'+(fails.length+warns.length)+" Issue"+(fails.length+warns.length>1?"s":"")+'</span><div style="display:flex;gap:6px"><button class="btn-sm" onclick="refreshAll()">Refresh</button></div></div>';
        for(const id of[...fails,...warns]){const x=state.health[id];if(!x)continue;const isFail=x.status==="fail";const diag=state.diagnoses[id];
          h+='<div class="issue-row"><span class="issue-severity '+(isFail?"critical":"warning")+'"></span><div class="issue-body"><div class="issue-title">'+(x.label||id)+": "+esc(x.summary||"")+"</div><div class='issue-detail'>"+esc(issueNarrative(id,x))+"</div>";
          if(diag)h+="<div style='background:var(--surface2);border-radius:6px;padding:6px 8px;margin-top:6px;font-size:10px'><div style='color:var(--amber);font-weight:700;margin-bottom:2px'>Diagnosed "+fmtTime(diag.diagnosedAt)+"</div><div style='color:var(--muted)'>"+(diag.errorCount>0?diag.errorCount+" errors found":"Errors captured")+"</div></div>";
          h+='<div class="issue-meta">';if(isFail&&canAutoFix(id))h+='<button class="issue-action" onclick="triggerFix(\''+id+'\')" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:var(--green)">Review & Fix</button>';if(isFail&&canAutoFix(id)&&!diag)h+='<button class="issue-action" onclick="triggerDiagnose(\''+id+'\')" style="background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3);color:var(--amber)">Diagnose</button>';h+='<button class="issue-action" onclick="chatAboutIssue(\''+esc(x.label||id)+'\',\''+esc(x.summary||"")+'\')">Ask Agent</button><button class="issue-action" onclick="runCheck(\''+id+'\')">Re-check</button></div></div></div>';}h+="</div>";}
      h+='<div class="prompt-bar" style="margin-bottom:16px"><div class="prompt-row"><input type="text" id="claude-input" placeholder="Ask the agent anything..." onkeydown="if(event.key===\'Enter\')sendChat()"><select id="focus-select" onchange="state.chatFocus=this.value">'+FOCUS_AREAS.map(f=>'<option value="'+f.id+'"'+(state.chatFocus===f.id?" selected":"")+">"+f.label+"</option>").join("")+"</select><button onclick='sendChat()'>Send</button></div></div>";
      h+='<div class="section-header"><span class="section-title">Quick Actions</span></div><div class="prompt-grid">';for(const p of PROMPT_LIBRARY)h+='<div class="prompt-card" onclick="sendChatFromPrompt(\''+esc(p.prompt)+'\')"><div class="prompt-card-cat">'+p.cat+'</div><div class="prompt-card-title">'+p.title+'</div><div class="prompt-card-desc">'+p.desc+"</div></div>";h+="</div>";
      if(state.feed.length>0){h+='<div class="section-header"><span class="section-title">Recent Activity</span></div><div class="feed-list">';for(const i of state.feed.slice(0,10))h+='<div class="feed-item"><span class="feed-dot '+(i.status==="ok"?"ok":i.status==="fail"?"fail":"warn")+'"></span><span class="feed-type">'+i.type+'</span><span class="feed-title">'+esc(i.title)+'</span><span class="feed-time">'+fmtTime(i.timestamp)+"</span></div>";h+="</div>";}
      if(state.outputVisible&&state.output)h+=renderOutputPanel();
      h+='<div class="collapse-header" onclick="toggleWorkflows()"><span class="chevron '+(state.workflowsExpanded?"open":"")+'">&#9654;</span><span class="section-title">Workflows</span></div>';if(state.workflowsExpanded)for(const w of state.workflows)h+='<div class="wf-card"><div class="wf-dot" style="background:'+(w.isActive?"var(--green)":"var(--dim)")+'"></div><div class="wf-info"><div class="wf-name">'+esc(w.name)+'</div><div class="wf-meta">'+w.engine+"</div></div><button class='run-btn' onclick=\"triggerWorkflow('"+w.id+"')\">Run</button></div>";
      c.innerHTML=h;}

    function renderChatView(){const c=document.getElementById("content");let h='<div class="briefing"><div class="briefing-greeting">Agent Chat</div><div class="briefing-summary">Talk to your dev agent. It can read, edit, and run commands.</div></div>';
      h+='<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim)">Focus:</span>';for(const f of FOCUS_AREAS)h+='<button class="btn-sm '+(state.chatFocus===f.id?"btn-primary":"")+'" onclick="state.chatFocus=\''+f.id+'\';renderView()" style="font-size:10px">'+f.label+"</button>";h+='<div style="margin-left:auto"><button class="btn-sm" onclick="clearChat()">Clear</button></div></div>';
      h+='<div class="chat-messages" id="chat-messages">';if(state.chatHistory.length===0&&!state.agentRunning)h+='<div class="empty">No messages yet.</div>';
      for(const msg of state.chatHistory)h+='<div class="chat-msg '+msg.role+'"><span class="chat-sender">'+(msg.role==="user"?"Andrew":"Agent")+'</span><span class="chat-time">'+fmtTime(msg.timestamp)+'</span><div class="chat-text">'+renderMarkdown(msg.content)+"</div></div>";
      if(state.agentRunning&&state.chatStreaming)h+='<div class="chat-msg assistant"><span class="chat-sender">Agent <span class="streaming-dot"></span></span><div class="chat-text" id="chat-stream">'+esc(state.chatStreaming)+"</div></div>";
      else if(state.agentRunning)h+='<div class="chat-msg assistant"><span class="chat-sender">Agent <span class="streaming-dot"></span></span><div class="chat-text">Thinking...</div></div>';
      h+='</div><div class="prompt-row" style="margin-bottom:12px"><input type="text" id="chat-input" placeholder="Message the agent..." onkeydown="if(event.key===\'Enter\')sendChat()"'+(state.agentRunning?" disabled":"")+'><button onclick="sendChat()"'+(state.agentRunning?" disabled":"")+">Send</button><button class='btn-sm' onclick='startResearch()'"+(state.agentRunning?" disabled":"")+">Research</button></div>";
      h+='<div class="section-header"><span class="section-title">Agent Memory</span><div><button class="btn-sm" onclick="addMemoryPrompt()">Add</button></div></div>';
      if(state.memories.length>0)for(let i=0;i<state.memories.length;i++){const m=state.memories[i];const tc=m.type==="correction"?"var(--red)":m.type==="preference"?"var(--cyan)":"var(--green)";h+='<div class="memory-entry"><span class="memory-tag" style="color:'+tc+'">'+m.type+'</span><span style="flex:1">'+esc(m.content)+'</span><button class="memory-del" onclick="removeMemory('+i+')">x</button></div>';}
      else h+='<div class="empty" style="padding:8px">No memories yet.</div>';
      c.innerHTML=h;const msgs=document.getElementById("chat-messages");if(msgs)msgs.scrollTop=msgs.scrollHeight;}

    function renderAuditView(){const c=document.getElementById("content");let h='<div class="briefing"><div class="briefing-greeting">Audit</div><div class="briefing-summary">Run real tools, then Claude analyzes actual output.</div></div>';
      h+='<div class="audit-grid">';for(const s of AUDIT_SCOPES){const active=state.auditScope===s.id&&state.agentRunning;h+='<div class="audit-btn '+(active?"active":"")+'" onclick="runAudit(\''+s.id+'\')"><div class="audit-btn-icon">'+s.icon+'</div><div class="audit-btn-label">'+s.label+"</div></div>";}h+="</div>";
      if(state.agentRunning&&state.auditStreaming)h+='<div class="output-panel"><div class="output-header">Audit Running <span class="streaming-dot"></span></div><div class="output-body" id="audit-stream">'+esc(state.auditStreaming)+"</div></div>";
      if(state.auditResults&&!state.agentRunning){const r=state.auditResults;const sc=r.status==="red"?"var(--red)":r.status==="yellow"?"var(--amber)":"var(--green)";h+='<div style="margin-bottom:12px"><span class="badge" style="background:'+sc+'20;color:'+sc+'">'+(r.scope||"audit")+": "+r.status+"</span>"+(r.summary?" <span style='font-size:12px;color:var(--muted)'>"+esc(r.summary)+"</span>":"")+"</div>";
        if(r.findings?.length>0){h+='<div class="section-header"><span class="section-title">Findings</span></div>';for(const f of r.findings)h+='<div class="finding-card"><div class="finding-head"><span class="finding-sev '+(f.severity||"medium")+'">'+(f.severity||"med")+'</span><span class="finding-title">'+esc(f.title||"")+'</span></div><div class="finding-detail">'+esc(f.detail||"")+"</div>"+(f.file?'<span class="finding-file">'+esc(f.file)+"</span>":"")+"</div>";}
        if(r.narrative)h+='<div class="section-header" style="margin-top:12px"><span class="section-title">Analysis</span></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px"><div class="md">'+renderMarkdown(r.narrative)+"</div></div>";}
      h+='<div class="section-header" style="margin-top:16px"><span class="section-title">Auto-Fix History</span></div>';
      if(state.autofixStatus?.recentHistory?.length>0)for(const e of state.autofixStatus.recentHistory.slice().reverse())h+='<div class="activity-item">'+(e.success?'<span style="color:var(--green)">&#10003;</span>':'<span style="color:var(--red)">&#10007;</span>')+'<span class="activity-text">'+esc(e.label||e.checkId)+" — attempt "+e.attempt+(e.success?" fixed":" failed")+'</span><span class="activity-time">'+fmtTime(e.startedAt)+"</span></div>";
      else h+='<div class="empty" style="padding:8px">No auto-fix attempts yet.</div>';c.innerHTML=h;}


    function renderSettingsView(){const c=document.getElementById("content");let h='<div class="briefing"><div class="briefing-greeting">Settings</div></div>';
      h+='<div class="settings-section"><h3>Behavior</h3>'+settingToggle("autoDiagnose","Auto-Diagnose Failures","Automatically diagnose when health checks fail (safe, read-only)")+settingToggle("scheduledRuns","Scheduled Audits","Daily security audit 9AM, weekly full audit Mon 10AM")+"</div>";
      h+='<div class="settings-section"><h3>Appearance</h3><div class="setting-row"><div class="setting-label">Theme</div><select class="setting-select" onchange="updateSetting(\'theme\',this.value);applyTheme(this.value)"><option value="system"'+(state.settings.theme==="system"?" selected":"")+'>System</option><option value="dark"'+(state.settings.theme==="dark"?" selected":"")+'>Dark</option><option value="light"'+(state.settings.theme==="light"?" selected":"")+">Light</option></select></div></div>";
      h+='<div class="settings-section"><h3>Credentials</h3>'+credRow("supabaseAccessToken","Supabase Token")+credRow("vercelToken","Vercel Token")+credRow("resendApiKey","Resend API Key")+"</div>";c.innerHTML=h;}
    function settingToggle(key,label,desc){const checked=state.settings[key]!==false;return'<div class="setting-row"><div><div class="setting-label">'+label+'</div><div class="setting-desc">'+desc+'</div></div><label class="toggle"><input type="checkbox" '+(checked?"checked":"")+" onchange=\"updateSetting('"+key+"',this.checked)\"><span class='toggle-track'></span></label></div>";}
    function credRow(key,label){return'<div class="setting-row"><div class="setting-label">'+label+'</div><input class="cred-input" type="password" value="'+(state.credentials[key]||"")+'" onblur="updateCred(\''+key+"',this.value)\" placeholder='...'></div>";}

    async function sendChat(){const input=document.getElementById("chat-input")||document.getElementById("claude-input");const msg=input?.value?.trim();if(!msg||state.agentRunning)return;input.value="";state.chatStreaming="";state.agentRunning=true;state.chatHistory.push({role:"user",content:msg,timestamp:new Date().toISOString()});navigate("chat");const r=await window.ironsight.agentChat(msg,state.chatFocus);state.agentRunning=false;state.chatStreaming="";state.chatHistory=await window.ironsight.agentGetHistory();renderView();}
    async function sendChatFromPrompt(prompt){state.chatStreaming="";state.agentRunning=true;state.chatHistory.push({role:"user",content:prompt,timestamp:new Date().toISOString()});navigate("chat");await window.ironsight.agentChat(prompt,state.chatFocus);state.agentRunning=false;state.chatStreaming="";state.chatHistory=await window.ironsight.agentGetHistory();renderView();}
    async function startResearch(){const q=prompt("What should the agent investigate?");if(!q)return;state.auditStreaming="";state.agentRunning=true;state.chatHistory.push({role:"user",content:"[Research] "+q,timestamp:new Date().toISOString()});renderView();await window.ironsight.agentResearch(q);state.agentRunning=false;state.auditStreaming="";state.chatHistory=await window.ironsight.agentGetHistory();renderView();}
    async function runAudit(scope){if(state.agentRunning)return;state.auditScope=scope;state.auditStreaming="";state.auditResults=null;state.agentRunning=true;renderView();const r=await window.ironsight.agentAudit(scope);state.agentRunning=false;state.auditStreaming="";state.auditResults=r;state.autofixStatus=await window.ironsight.autofixStatus();renderView();}
    async function clearChat(){await window.ironsight.agentClearHistory();state.chatHistory=[];state.chatStreaming="";renderView();}
    function chatAboutIssue(label,summary){const msg=label+" is failing: "+summary+". What's wrong and how do I fix it?";const input=document.getElementById("claude-input")||document.getElementById("chat-input");if(input){input.value=msg;input.focus();}else sendChatFromPrompt(msg);}
    function canAutoFix(id){return["tests","typecheck","build","lint"].includes(id);}
    async function triggerDiagnose(id){await window.ironsight.autofixDiagnose(id);}
    async function triggerFix(id){state.autofixLog="";state.pendingFix=null;const r=await window.ironsight.autofixFix(id);if(r.needsReview)state.pendingFix=r;state.autofixStatus=await window.ironsight.autofixStatus();renderView();}
    async function mergePendingFix(){if(!state.pendingFix?.branch)return;const r=await window.ironsight.autofixMerge(state.pendingFix.branch);state.pendingFix=null;if(r.success)refreshAll();else alert("Merge failed: "+(r.reason||""));renderView();}
    function showFullDiff(){if(!state.pendingFix?.diff?.full)return;state.output={title:"Diff: "+state.pendingFix.branch,body:state.pendingFix.diff.full};state.outputVisible=true;renderView();}
    async function discardPendingFix(){if(!state.pendingFix?.branch)return;await window.ironsight.autofixDiscard(state.pendingFix.branch);state.pendingFix=null;renderView();}
    async function runCheck(id){state.runningChecks.add(id);renderView();await window.ironsight.runSingleCheck(id);}
    async function refreshAll(){state.health=await window.ironsight.getSystemHealth();renderView();}
    async function addMemoryPrompt(){const type=prompt("Type: correction, preference, or learning","correction");if(!type)return;const content=prompt("What should the agent remember?");if(!content)return;state.memories=await window.ironsight.agentAddMemory(type,content);renderView();}
    async function removeMemory(i){state.memories=await window.ironsight.agentRemoveMemory(i);renderView();}
    function updateSetting(k,v){state.settings[k]=v;window.ironsight.saveSettings(state.settings);}
    function updateCred(k,v){state.credentials[k]=v;window.ironsight.saveCredentials(state.credentials);}
    async function toggleWorkflows(){state.workflowsExpanded=!state.workflowsExpanded;if(state.workflowsExpanded&&state.workflows.length===0)state.workflows=await window.ironsight.getWorkflows();renderView();}
    async function triggerWorkflow(id){await window.ironsight.triggerWorkflow(id);}
    function showOutput(title,body,streaming,result){state.output={title,body,streaming,result};state.outputVisible=true;if(state.currentView==="watch")renderView();}
    function renderOutputPanel(){const o=state.output;return'<div class="output-panel"><div class="output-header"><span>'+(o.title||"Output")+(o.streaming?' <span class="streaming-dot"></span>':"")+'</span><button style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 8px;font-size:9px;cursor:pointer" onclick="state.outputVisible=false;renderView()">Close</button></div><div class="output-body" id="output-body">'+esc(o.streaming?state.streamingOutput:(o.body||""))+"</div></div>";}
    function updateOutputBody(){const el=document.getElementById("output-body");if(el){el.textContent=state.streamingOutput;el.scrollTop=el.scrollHeight;}}
    function updateStatusBar(){const all=Object.values(state.health);const fails=all.filter(h=>h.status==="fail").length;const oks=all.filter(h=>h.status==="ok").length;const dot=fails>0?"var(--red)":"var(--green)";document.getElementById("sb-health").innerHTML='<span class="sb-dot" style="background:'+dot+'"></span> '+(fails>0?fails+" failing":oks+" healthy");const pi=state.health.pi;if(pi)document.getElementById("sb-pi").innerHTML='Pi 5: <span class="val">'+pi.summary+"</span>";const g=state.health.git?.detail;if(g)document.getElementById("sb-git").innerHTML='<span class="val">'+(g.branch||"...")+"</span>"+(g.dirty>0?" +"+g.dirty:"");}
    function updateHealthBadge(){const fails=Object.values(state.health).filter(h=>h.status==="fail").length;const b=document.getElementById("health-badge");if(fails>0){b.textContent=fails+" FAILING";b.className="badge badge-red";}else{b.textContent="HEALTHY";b.className="badge badge-green";}}
    function updateAgentBadge(r){document.getElementById("agent-badge").style.display=r?"":"none";}
    function updateAutofixBar(){const el=document.getElementById("sb-autofix");if(state.autofixActive){el.innerHTML='<span class="sb-dot" style="background:var(--blue);animation:pulse 1s infinite"></span> Fixing '+state.autofixActive;el.style.display="";}else el.style.display="none";}
    function issueNarrative(id,check){const d=check.detail||{};if(id==="tests"&&d.failed)return d.failed+" test"+(d.failed>1?"s":"")+" failing out of "+d.total;if(id==="typecheck"&&d.count)return d.count+" TypeScript error"+(d.count>1?"s":"");if(id==="build")return"Next.js build failing";if(id==="deps"&&d.critical)return d.critical+" critical, "+(d.high||0)+" high vulnerabilities";if(id==="lint"&&d.errors)return d.errors+" lint error"+(d.errors>1?"s":"");return check.summary||"";}
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
    function fmtTime(ts){if(!ts)return"";const d=new Date(ts);const diff=Date.now()-d;if(diff<60000)return"just now";if(diff<3600000)return Math.floor(diff/60000)+"m ago";if(diff<86400000)return Math.floor(diff/3600000)+"h ago";return d.toLocaleDateString();}
    function renderMarkdown(text){if(!text)return"";return esc(text).replace(/```(\w*)\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");}
    init();
  </script>
</body>
</html>
