name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip for watchdog branches that are minor fixes
    if: "!contains(github.event.pull_request.title, '[skip-review]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          # Truncate to 50k chars to stay within token limits
          DIFF_TRUNCATED=$(echo "$DIFF" | head -c 50000)
          echo "DIFF<<GHEOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_TRUNCATED" >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed file list
        id: files
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --name-only)
          echo "FILES<<GHEOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review with Claude
        id: review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the IronSight fleet monitoring platform.

            PR Title: ${{ github.event.pull_request.title }}
            PR Body: ${{ github.event.pull_request.body }}

            Changed files:
            ${{ steps.files.outputs.FILES }}

            Key rules to check (from CLAUDE.md):
            - NEVER use DD1 for distance — must use DS10 countdown
            - NEVER disable listen-only mode on CAN bus (can0)
            - All Viam credentials must stay server-side, never in browser
            - Dashboard must remain mobile-friendly
            - Auth middleware is default-deny on all /api routes
            - Journal entries must balance (debits = credits)
            - No security vulnerabilities (OWASP top 10)

            Review the diff for:
            1. Bugs or logic errors
            2. Security issues (credential leaks, SQL injection, XSS, auth bypass)
            3. Violations of the project rules above
            4. Breaking changes to existing behavior

            Be concise. Only flag actual issues — do not suggest style changes, rename variables, or add comments.
            If everything looks good, say so in one sentence.

            Diff:
            ${{ steps.diff.outputs.DIFF }}
          max_turns: 1
          timeout_minutes: 3
